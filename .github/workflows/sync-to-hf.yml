name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - uv.lock
      - pnpm-lock.yaml
      - Dockerfile
      - .dockerignore
      - server/**
      - hsi-utils/**
      - src/**
      - index.html
      - "*.config.ts"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://markchen9804:$HF_TOKEN@huggingface.co/spaces/markchen9804/relay-lens main
